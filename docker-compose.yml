services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: change-me-in-production
      MONGODB_URI: mongodb://mongo:27017/inventory
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: artifacts/inventory/Dockerfile
      args:
        PORT: 5173
        BASE_PATH: /
        VITE_API_BASE_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 5173
      BASE_PATH: /
      VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - "8080:5173"

volumes:
  mongo_data:
